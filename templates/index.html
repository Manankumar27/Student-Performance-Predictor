<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center mb-4">
            Student Performance Predictor
        </h1>

        <form action="/predict" method="POST">

            <div class="row">

                <!-- Age -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Age</label>
                    <input type="number"
                           class="form-control"
                           name="Age"
                           min="15"
                           max="18"
                           placeholder="15 - 18"
                           required>
                </div>

                <!-- Gender -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-control" name="Gender" required>
                        <option value="">Select Gender</option>
                        <option value="0">Male</option>
                        <option value="1">Female</option>
                    </select>
                </div>

                <!-- Ethnicity -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ethnicity</label>
                    <select class="form-control" name="Ethnicity" required>
                        <option value="">Select Ethnicity</option>
                        <option value="0">Group 0</option>
                        <option value="1">Group 1</option>
                        <option value="2">Group 2</option>
                        <option value="3">Group 3</option>
                    </select>
                </div>

                <!-- Parental Education -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Parental Education</label>
                    <select class="form-control" name="ParentalEducation" required>
                        <option value="">Select Level</option>
                        <option value="0">Level 0</option>
                        <option value="1">Level 1</option>
                        <option value="2">Level 2</option>
                        <option value="3">Level 3</option>
                        <option value="4">Level 4</option>
                    </select>
                </div>

                <!-- Study Time -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Study Time Weekly</label>
                    <input type="number"
                           step="0.1"
                           class="form-control"
                           name="StudyTimeWeekly"
                           min="0"
                           max="25"
                           placeholder="0 - 25 Hours"
                           required>
                </div>

                <!-- Absences -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Absences</label>
                    <input type="number"
                           class="form-control"
                           name="Absences"
                           min="0"
                           max="30"
                           placeholder="0 - 30"
                           required>
                </div>

                <!-- Tutoring -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tutoring</label>
                    <select class="form-control" name="Tutoring" required>
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <!-- Parental Support -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Parental Support</label>
                    <select class="form-control" name="ParentalSupport" required>
                        <option value="">Select Support Level</option>
                        <option value="0">None</option>
                        <option value="1">Low</option>
                        <option value="2">Moderate</option>
                        <option value="3">High</option>
                        <option value="4">Very High</option>
                    </select>
                </div>

                <!-- Extracurricular -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Extracurricular Activities</label>
                    <select class="form-control" name="Extracurricular" required>
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <!-- Sports -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sports</label>
                    <select class="form-control" name="Sports" required>
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <!-- Music -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Music</label>
                    <select class="form-control" name="Music" required>
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <!-- Volunteering -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Volunteering</label>
                    <select class="form-control" name="Volunteering" required>
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <!-- GPA -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">GPA</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="GPA"
                           min="0"
                           max="4"
                           placeholder="0.00 - 4.00"
                           required>
                </div>

            </div>

            <div class="text-center mt-3">
                <button type="submit"
                        class="btn btn-primary btn-lg">
                    Predict Performance
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
